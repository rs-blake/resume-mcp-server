name: CI

on:
  push:
    branches: ["main", "cursor/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Verify module imports
        run: |
          python -c "import mcp_server, resumeup_tailor, resumeup_workflow, application_orchestrator, linkedin_job_search, application_store, job_matcher"
